<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/todo.css">
</head>
<body>
    <main class="app">
        <section class="todo">
            <header class="todo-header">
                <h1>Todo List</h1>
                <p>Công việc cần làm</p>
            </header>

            <div class="progress-container">
                <div class="progress-info">
                    <span>0% hoàn thành</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="stats">
                <div class="card">Tổng: <span id="total">0</span></div>
                <div class="card">Done: <span id="done">0</span></div>
                <div class="card">Pending: <span id="pending">0</span></div>
            </div>

            <input type="text" id="search" placeholder="Tìm kiếm...">

            <div class="filter">
                <button data-filter="all" class="active">Tất cả</button>
                <button data-filter="completed">Đã hoàn thành</button>
                <button data-filter="pending">Chưa hoàn thành</button>
            </div>

            <form class="todo-form">
                <input type="text" id="todo-input" placeholder="Công việc ngày hôm nay?">
                <button type="submit" id="add-btn">Thêm</button>
            </form>

            <ul class="todo-list" id="todo-list"></ul>
            <p id="empty-state">Chưa có công việc nào</p>
        </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/todo.js"></script>
</body>
</html>
